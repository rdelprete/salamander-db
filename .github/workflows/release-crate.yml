name: Release crate

# Publishes salamander-db to crates.io via Trusted Publishing (OIDC — no API
# token stored in the repo). Triggered by the same version tag that drives the
# Python wheels, so one `git tag vX.Y.Z && git push origin vX.Y.Z` ships both.
#
# One-time crates.io setup: on the salamander-db crate page →
# Settings → Trusted Publishing → Add a new publisher:
#   Repository owner  : rdelprete
#   Repository name   : salamander-db
#   Workflow filename : release-crate.yml
#   Environment       : (leave blank)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # manual runs build+verify but do not publish (see the `if` below)

permissions:
  contents: read

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    # Only publish on a real tag push, never on a manual dry run.
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write # required for crates.io Trusted Publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish
        run: cargo publish -p salamander-db
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
