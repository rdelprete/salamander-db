name: Crash harness

on:
  schedule:
    - cron: "0 7 * * *"  # nightly
  workflow_dispatch:
    inputs:
      iterations:
        description: "Number of process-kill iterations"
        required: false
        default: "200"

env:
  CARGO_TERM_COLOR: always

jobs:
  crash-loop:
    name: Crash harness (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release -p salamander-demo
      - shell: pwsh
        run: >-
          pwsh -NoProfile -ExecutionPolicy Bypass
          -File ./scripts/crash_loop.ps1
          -Iterations ${{ github.event.inputs.iterations || '200' }}
