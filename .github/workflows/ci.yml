name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace

  python:
    name: Python (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            venv-python: .venv/bin/python
          - os: macos-latest
            venv-python: .venv/bin/python
          - os: windows-latest
            venv-python: .venv/Scripts/python.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - run: python -m venv .venv
      - run: ${{ matrix.venv-python }} -m pip install maturin pytest
      - run: >-
          ${{ matrix.venv-python }} -m maturin develop
          --manifest-path salamander-py/Cargo.toml
      - run: >-
          ${{ matrix.venv-python }} -m pytest
          examples/py/test_roundtrip.py
          examples/py/test_query_and_fork.py
          examples/py/test_watch.py
          examples/py/test_chat.py
          examples/py/test_unkillable_agent.py
          examples/py/test_dungeon.py
          -v

  msrv:
    name: Rust 1.90 MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.90.0
      - run: cargo test --workspace
